version: "3.9"

services:
  api:
    build: .
    container_name: pathvision-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pathvision
      - DATABASE_SYNC_URL=postgresql://postgres:postgres@db:5432/pathvision
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pathvision-network

  db:
    image: postgres:16-alpine
    container_name: pathvision-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pathvision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pathvision-network

  redis:
    image: redis:7-alpine
    container_name: pathvision-redis
    ports:
      - "6379:6379"
    networks:
      - pathvision-network

  celery:
    build: .
    container_name: pathvision-celery
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pathvision
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - db
    command: celery -A app.celery_app worker --loglevel=info
    networks:
      - pathvision-network

  celery-beat:
    build: .
    container_name: pathvision-celery-beat
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - celery
    command: celery -A app.celery_app beat --loglevel=info
    networks:
      - pathvision-network

  nginx:
    image: nginx:alpine
    container_name: pathvision-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - pathvision-network

volumes:
  postgres_data:

networks:
  pathvision-network:
    driver: bridge
